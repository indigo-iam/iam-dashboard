services:
  login_service:
    container_name: iam-login-service
    image: indigoiam/iam-login-service:latest
    restart: unless-stopped
    env_file: .env
    environment:
      IAM_JAVA_OPTS: -Dspring.profiles.active=h2-test,oidc,registration
      TZ: Europe/Rome
      IAM_PORT: 8080
      IAM_HOST: iam.test.example
      IAM_BASE_URL: https://iam.test.example
      IAM_ISSUER: https://iam.test.example
      IAM_REGISTRATION_OIDC_ISSUER: https://iam.test.example
      IAM_REGISTRATION_AUTHENTICATION_TYPE: oidc
      IAM_ACCESS_TOKEN_INCLUDE_SCOPE: true
      IAM_SCIM_INCLUDE_AUTHORITIES: true
      IAM_ORGANISATION_NAME: cnafsd
      IAM_DASHBOARD_ENABLED: true
      IAM_DASHBOARD_CLIENT_ID:
      IAM_DASHBOARD_CLIENT_SECRET:
    healthcheck:
      test: [CMD, "curl", "-f", "http://localhost:8080/actuator/health"]

  dashboard:
    container_name: iam-dashboard
    image: iam-dashboard:test
    build:
      context: .
      args:
        IAM_DASHBOARD_BASE_PATH: /ui
    command: ["node", "server.js"]
    depends_on:
      login_service:
        condition: service_healthy
    volumes:
      - ./assets/trust/star_test_example_ca.pem:/etc/ssl/certs/star_test_example_ca.pem
    env_file: .env
    environment:
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/star_test_example_ca.pem
      IAM_API_URL:
      IAM_DASHBOARD_BASE_URL:
      IAM_DASHBOARD_BASE_PATH:
      IAM_DASHBOARD_CLIENT_ID:
      IAM_DASHBOARD_CLIENT_SECRET:
      IAM_DASHBOARD_AUTH_SECRET:
      IAM_DASHBOARD_OTEL_EXPORTER_OTLP_ENDPOINT:

  nginx:
    image: nginx:stable
    container_name: iam-nginx
    hostname: iam.test.example
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_started
      login_service:
        condition: service_healthy
    command: ["nginx-debug", "-g", "daemon off;"]
    ports:
      - "443:443"
      - "80:80"
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./assets/trust:/etc/nginx/certs
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
